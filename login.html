<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-blue-100 flex items-center justify-center h-screen">
    <section class="bg-white p-6 w-auto flex h-auto rounded-xl shadow-lg gap-8">
        <div class="flex flex-col">
            <input type="text" class="outline-none border-b-[1.4px] border-gray-600"  placeholder="Email">

            <input type="password" class="outline-none border-b-[1.4px] border-gray-600 mt-4" placeholder="Password">

            <button class="bg-blue-500 text-white py-1 rounded-md mt-6 mb-4">Login</button>

            <p>Don't have an account? <a href="#" class="text-blue-500">Sign up</a></p>
        </div>

        <div>
        </div>
    </section>
</body>
</html>
